    :root {
      --bg: #f4f1eb;

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "SF Pro Display", "Noto Sans SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 10%, rgba(244, 118, 74, 0.16) 0, transparent 28%),

      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.42;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      top: -120px;
      left: -120px;
      background: rgba(255, 196, 171, 0.5);
    }

    body::after {
      right: -120px;
      bottom: -120px;
      background: rgba(184, 234, 222, 0.46);
    }

    @keyframes fadeUpSoft {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes modalInSoft {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

    .dropdown-item:hover { background: #f8fafc; }

    .layout {
      display: grid;
      grid-template-columns: minmax(260px, 1.12fr) 6px minmax(340px, 1.22fr) 6px minmax(168px, 208px);
      gap: 6px;
      padding: 8px;

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;

    function renderThemes() {
      const query = searchInput.value.trim();
      const list = themes.filter((t) => {

        const matchFilter = currentFilter === "全部" || buckets.includes(currentFilter);

      const raw = getHuashengThemeStyle(theme);

    function applyTheme(theme) {
      preview.style.setProperty("--accent", customStyle.accent || theme.accent);

        return;
      }
      preview.dataset.rawTheme = "false";
      const preset = getThemePreset(theme);
      preview.style.background = preset.previewBg;
      preview.style.color = theme.text;
      preview.style.fontFamily = preset.bodyFont;

    function updatePreview() {
      const wasFocused =
        document.activeElement === editor ||
        document.activeElement === editorRich;
      const prevRatio = preview.scrollTop / (preview.scrollHeight - preview.clientHeight || 1);

      preview.innerHTML = buildWeChatHtml();

      if (preview.dataset.rawTheme === "true") {

      if (wasFocused) {

        preview.scrollTop = max * prevRatio;

    function wrapPreviewTables(root) {
      root.querySelectorAll("table").forEach((table) => {
        if (table.parentElement?.classList.contains("table-scroll")) return;
        const wrapper = document.createElement("div");
        wrapper.className = "table-scroll";
        table.parentNode.insertBefore(wrapper, table);
        wrapper.appendChild(table);

    function updateStats() {
      const source = editorMode === "rich" ? editorRich.innerText : htmlContent;
      const text = (source || "").replace(/\\s+/g, " ").trim();
      const count = text.length;
      const minutes = count ? Math.max(1, Math.round(count / 400)) : 0;
      editorStats.textContent = `${count} 字 · ${minutes} 分钟阅读`;
    }

    function getCursorRatio() {
      if (editorMode === "rich") {
        const max = editorRich.scrollHeight - editorRich.clientHeight || 1;
        return Math.min(1, Math.max(0, editorRich.scrollTop / max));
      }
      const total = editor.value.length || 1;
      return Math.min(1, Math.max(0, editor.selectionStart / total));
    }

    function syncPreviewToCursor() {
      const ratio = getCursorRatio();
      const max = preview.scrollHeight - preview.clientHeight;
      preview.scrollTop = max * ratio;

    let isSyncing = false;
    function syncScroll(fromEditor) {
      if (isSyncing) return;
      isSyncing = true;
      const left = editorMode === "rich" ? editorRich : editor;
      const right = preview;
      if (fromEditor) {
        const leftRatio = left.scrollTop / (left.scrollHeight - left.clientHeight || 1);
        const rightMax = right.scrollHeight - right.clientHeight;
        right.scrollTop = rightMax * leftRatio;
      } else {
        const rightRatio = right.scrollTop / (right.scrollHeight - right.clientHeight || 1);
        const leftMax = left.scrollHeight - left.clientHeight;
        left.scrollTop = leftMax * rightRatio;
      }
      requestAnimationFrame(() => {
        isSyncing = false;
      });
    }

    function applyInline(tag) {
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const text = editor.value;
      const selected = text.slice(start, end);
      const wrap = tag.replace("{text}", selected || "");
      editor.value = text.slice(0, start) + wrap + text.slice(end);

    function insertHtmlAtCursor(html) {
      if (editorMode === "html") {
        const start = editor.selectionStart;

        editor.focus();
        updatePreview();
        return;
      }
      editorRich.focus();
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) {
        editorRich.insertAdjacentHTML("beforeend", html);
        updatePreview();
        return;
      }
      const range = sel.getRangeAt(0);
      range.deleteContents();
      const temp = document.createElement("div");
      temp.innerHTML = html;
      const frag = document.createDocumentFragment();
      while (temp.firstChild) {
        frag.appendChild(temp.firstChild);
      }
      range.insertNode(frag);
      range.collapse(false);
      sel.removeAllRanges();
      sel.addRange(range);
      updatePreview();

      const start = editor.selectionStart;

    function buildWeChatHtml() {
      const wrapper = document.createElement("div");

      inlineStylesFromStyleTags(wrapper, { applyTagSelectors: false });
      if (getHuashengThemeStyle(currentTheme)) {
        return applyHuashengInlineStyles(wrapper.innerHTML, currentTheme);
      }
      // Apply theme inline styles to match preview when copying
      applyInlineStyles(wrapper, currentTheme, editorMode === "rich");
      return wrapper.innerHTML;

    function groupConsecutiveImages(doc) {
      const body = doc.body;
      const children = Array.from(body.children);
      const imagesToProcess = [];

      children.forEach((child, index) => {
        if (child.tagName === "P") {
          const images = child.querySelectorAll("img");
          if (images.length > 1) {
            Array.from(images).forEach((img) => {
              imagesToProcess.push({ element: child, img, index });
            });
          } else if (images.length === 1) {
            imagesToProcess.push({ element: child, img: images[0], index });
          }
        } else if (child.tagName === "IMG") {
          imagesToProcess.push({ element: child, img: child, index });
        }
      });

      const groups = [];
      let currentGroup = [];
      imagesToProcess.forEach((item, idx) => {
        if (idx === 0) {
          currentGroup.push(item);
          return;
        }
        const prev = imagesToProcess[idx - 1];
        const isContinuous = item.index === prev.index || item.index - prev.index === 1;
        if (isContinuous) {
          currentGroup.push(item);
          return;
        }
        if (currentGroup.length) groups.push([...currentGroup]);
        currentGroup = [item];
      });
      if (currentGroup.length) groups.push(currentGroup);

      groups.forEach((group) => {
        if (group.length < 2) return;
        const firstElement = group[0].element;
        const imageCount = group.length;
        const grid = doc.createElement("div");
        let columns = 2;
        if (imageCount === 3) columns = 3;
        if (imageCount >= 5) columns = 3;
        grid.setAttribute("class", "image-grid");
        grid.setAttribute("data-columns", String(columns));
        grid.setAttribute(
          "style",
          [
            "display:grid",
            `grid-template-columns:repeat(${columns}, 1fr)`,
            "gap:8px",
            "margin:20px auto",
            "max-width:100%",
            "align-items:start",
          ].join("; "),
        );

        group.forEach((item) => {
          const imgWrapper = doc.createElement("div");
          imgWrapper.setAttribute("style", "width:100%;height:auto;overflow:hidden;");
          const img = item.img.cloneNode(true);
          img.setAttribute(
            "style",
            "width:100%;height:auto;display:block;border-radius:8px;",
          );
          imgWrapper.appendChild(img);
          grid.appendChild(imgWrapper);
        });

        firstElement.parentNode.insertBefore(grid, firstElement);
        const elementsToRemove = new Set(group.map((item) => item.element));
        elementsToRemove.forEach((element) => {
          if (element.parentNode) element.parentNode.removeChild(element);
        });
      });
    }

    function convertGridNodeToTable(doc, grid, columns) {
      const imgWrappers = Array.from(grid.children);
      const table = doc.createElement("table");
      table.setAttribute(
        "style",
        "width:100%;border-collapse:separate;border-spacing:8px;margin:20px auto;",
      );

      for (let i = 0; i < imgWrappers.length; i += columns) {
        const tr = doc.createElement("tr");
        for (let j = 0; j < columns; j += 1) {
          const td = doc.createElement("td");
          td.setAttribute("style", "padding:0;vertical-align:top;border:none;");
          const wrapper = imgWrappers[i + j];
          if (wrapper) {
            const img = wrapper.querySelector("img");
            if (img) {
              const newImg = img.cloneNode(true);
              newImg.setAttribute(
                "style",
                "width:100% !important;height:auto !important;display:block !important;margin:0 auto !important;border-radius:8px !important;object-fit:contain !important;",
              );
              td.appendChild(newImg);
            }
          }
          tr.appendChild(td);
        }
        table.appendChild(tr);
      }

      grid.parentNode.replaceChild(table, grid);
    }

    function convertGridToTable(doc) {
      doc.querySelectorAll(".image-grid").forEach((grid) => {
        const columns = parseInt(grid.getAttribute("data-columns"), 10) || 2;
        convertGridNodeToTable(doc, grid, columns);
      });
    }

    function applyHuashengInlineStyles(html, theme) {
      const style = getHuashengThemeStyle(theme);
      if (!style) return html;

      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");
      const headingInlineOverrides = {
        strong: "font-weight: 700; color: inherit !important; background-color: transparent !important;",
        em: "font-style: italic; color: inherit !important; background-color: transparent !important;",
        a: "color: inherit !important; text-decoration: none !important; border-bottom: 1px solid currentColor !important; background-color: transparent !important;",
        code: "color: inherit !important; background-color: transparent !important; border: none !important; padding: 0 !important;",
        span: "color: inherit !important; background-color: transparent !important;",
        b: "font-weight: 700; color: inherit !important; background-color: transparent !important;",
        i: "font-style: italic; color: inherit !important; background-color: transparent !important;",
        del: "color: inherit !important; background-color: transparent !important;",
        mark: "color: inherit !important; background-color: transparent !important;",
        s: "color: inherit !important; background-color: transparent !important;",
        u: "color: inherit !important; text-decoration: underline !important; background-color: transparent !important;",
        ins: "color: inherit !important; text-decoration: underline !important; background-color: transparent !important;",
        kbd: "color: inherit !important; background-color: transparent !important; border: none !important; padding: 0 !important;",
        sub: "color: inherit !important; background-color: transparent !important;",
        sup: "color: inherit !important; background-color: transparent !important;",
      };
      const headingInlineSelectorList = Object.keys(headingInlineOverrides).join(", ");

      groupConsecutiveImages(doc);

      Object.keys(style).forEach((selector) => {
        if (selector === "container" || selector === "pre" || selector === "code" || selector === "pre code") {
          return;
        }
        doc.querySelectorAll(selector).forEach((el) => {
          if (el.tagName === "IMG" && el.closest(".image-grid")) return;
          const currentStyle = el.getAttribute("style") || "";
          el.setAttribute("style", `${currentStyle}; ${style[selector]}`);
        });
      });

      doc.querySelectorAll("pre, code, pre code").forEach((el) => {
        const selector =
          el.tagName.toLowerCase() === "pre"
            ? "pre"
            : el.parentElement?.tagName?.toLowerCase() === "pre"
              ? "pre code"
              : "code";
        if (!style[selector]) return;
        const currentStyle = el.getAttribute("style") || "";
        el.setAttribute("style", `${currentStyle}; ${style[selector]}`);
      });

      doc.querySelectorAll("h1, h2, h3, h4, h5, h6").forEach((heading) => {
        heading.querySelectorAll(headingInlineSelectorList).forEach((node) => {
          const tag = node.tagName.toLowerCase();
          const override = headingInlineOverrides[tag];
          if (!override) return;
          const sanitizedStyle = (node.getAttribute("style") || "")
            .replace(/color:\s*[^;]+;?/gi, "")
            .replace(/background(?:-color)?:\s*[^;]+;?/gi, "")
            .replace(/border(?:-bottom)?:\s*[^;]+;?/gi, "")
            .replace(/text-decoration:\s*[^;]+;?/gi, "")
            .replace(/box-shadow:\s*[^;]+;?/gi, "")
            .replace(/padding:\s*[^;]+;?/gi, "")
            .replace(/;\s*;/g, ";")
            .trim();
          node.setAttribute("style", `${sanitizedStyle}; ${override}`);
        });
      });

      const container = doc.createElement("div");
      container.setAttribute("style", style.container);
      container.innerHTML = doc.body.innerHTML;
      return container.outerHTML;
    }

    function isSafeUrl(url, type = "link") {
      const value = String(url || "").trim().replace(/[\u0000-\u001F\u007F\s]+/g, "");
      if (!value) return false;
      const lower = value.toLowerCase();
      if (lower.startsWith("#") || lower.startsWith("/") || lower.startsWith("./") || lower.startsWith("../")) {
        return true;
      }
      if (type === "image" && (lower.startsWith("data:image/") || lower.startsWith("blob:") || lower.startsWith("img:"))) {
        return true;
      }
      if (lower.startsWith("https://") || lower.startsWith("http://")) return true;
      if (type === "link" && (lower.startsWith("mailto:") || lower.startsWith("tel:"))) return true;
      return false;
    }

    function sanitizeStyleText(style) {
      const out = [];
      String(style || "")
        .split(";")
        .map((rule) => rule.trim())
        .filter(Boolean)
        .forEach((rule) => {
          const colonIndex = rule.indexOf(":");
          if (colonIndex === -1) return;
          const prop = rule.slice(0, colonIndex).trim().toLowerCase();
          const value = rule.slice(colonIndex + 1).trim();
          if (!SAFE_STYLE_PROPS.has(prop) || !value) return;
          const lowerValue = value.toLowerCase();
          if (
            lowerValue.includes("expression(") ||
            lowerValue.includes("url(") ||
            lowerValue.includes("@import") ||
            lowerValue.includes("javascript:")
          ) {
            return;
          }
          out.push(`${prop}: ${value}`);
        });
      return out.join("; ");
    }

    function sanitizeHtmlContainer(root) {
      if (!root) return;
      const nodes = Array.from(root.querySelectorAll("*"));
      nodes.forEach((el) => {
        const tag = el.tagName.toLowerCase();

        if (DROP_HTML_TAGS.has(tag)) {
          el.remove();
          return;
        }

        if (!SAFE_HTML_TAGS.has(tag)) {
          el.replaceWith(...Array.from(el.childNodes));
          return;
        }

        if (tag === "input") {
          const type = (el.getAttribute("type") || "").toLowerCase();
          if (type !== "checkbox") {
            el.remove();
            return;
          }
          el.setAttribute("type", "checkbox");
          if (el.hasAttribute("checked")) el.setAttribute("checked", "");
          else el.removeAttribute("checked");
          el.setAttribute("disabled", "");
        }

        const safeStyle = sanitizeStyleText(el.getAttribute("style") || "");
        if (safeStyle) el.setAttribute("style", safeStyle);
        else el.removeAttribute("style");

        Array.from(el.attributes).forEach((attr) => {
          const name = attr.name.toLowerCase();
          const value = attr.value;

          if (name.startsWith("on")) {
            el.removeAttribute(attr.name);
            return;
          }

          if (name === "style") return;

          if (tag === "a" && name === "href") {
            if (!isSafeUrl(value, "link")) el.removeAttribute("href");
            return;
          }

          if (tag === "img" && name === "src") {
            if (!isSafeUrl(value, "image")) {
              el.remove();
            }
            return;
          }

          if (
            ["alt", "title"].includes(name) ||
            (tag === "img" && ["width", "height"].includes(name)) ||
            ((tag === "td" || tag === "th") && ["colspan", "rowspan"].includes(name)) ||
            (tag === "input" && ["type", "checked", "disabled"].includes(name))
          ) {
            return;
          }

          el.removeAttribute(attr.name);
        });
      });
    }

    function inlineStylesFromStyleTags(root, options = {}) {
      const { applyTagSelectors = false } = options;
      const styleTags = Array.from(root.querySelectorAll("style"));
      if (!styleTags.length) return;

      const applyStyleText = (el, cssText) => {
        if (!cssText) return;
        const existing = el.getAttribute("style") || "";
        const merged = mergeInlineStyles(existing, cssText);
        el.setAttribute("style", merged);
      };

      styleTags.forEach((tag) => {
        const css = tag.textContent || "";
        const classRule = /\.([a-zA-Z0-9_-]+)\s*\{([^}]+)\}/g;
        let match;
        while ((match = classRule.exec(css))) {
          const className = match[1];
          const styleText = match[2];
          root.querySelectorAll(`.${className}`).forEach((el) => {
            applyStyleText(el, styleText);
          });
        }

        if (applyTagSelectors) {
          const tagRule = /(^|[\}\n])\s*([a-zA-Z][a-zA-Z0-9]*)\s*\{([^}]+)\}/g;
          while ((match = tagRule.exec(css))) {
            const tagName = match[2];
            const styleText = match[3];
            root.querySelectorAll(tagName).forEach((el) => {
              applyStyleText(el, styleText);
            });
          }
        }
      });

      styleTags.forEach((tag) => tag.remove());
    }

    function mergeInlineStyles(existing, extra) {
      const map = {};
      const toMap = (text) => {
        text
          .split(";")
          .map((s) => s.trim())
          .filter(Boolean)
          .forEach((pair) => {
            const [k, v] = pair.split(":").map((x) => (x || "").trim());
            if (k && v) map[k.toLowerCase()] = v;
          });
      };
      toMap(existing);
      toMap(extra);
      return Object.entries(map)
        .map(([k, v]) => `${k}: ${v}`)
        .join("; ");
    }

    function sanitizePastedHtml(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");
      const container = document.createElement("div");
      container.innerHTML = doc.body ? doc.body.innerHTML : html;
      inlineStylesFromStyleTags(container, { applyTagSelectors: false });
      sanitizeHtmlContainer(container);
      return container.innerHTML;
    }

    async function copyHtmlToClipboard(html) {
      const prepared = prepareWechatCompatibleHtml(html);
      const finalHtml = prepared.html;
      const plainText = prepared.text;

      if (navigator.clipboard && window.ClipboardItem) {
        const blobHtml = new Blob([finalHtml], { type: "text/html" });
        const blobText = new Blob([plainText], { type: "text/plain" });
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": blobHtml,
            "text/plain": blobText,
          }),
        ]);
        return;
      }
      const temp = document.createElement("div");
      temp.innerHTML = finalHtml;
      temp.style.position = "fixed";
      temp.style.left = "-9999px";
      document.body.appendChild(temp);
      const range = document.createRange();
      range.selectNodeContents(temp);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      document.execCommand("copy");
      sel.removeAllRanges();
      temp.remove();
    }

    function formatHistoryDate(timestamp) {
      if (!timestamp) return "";
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      if (diff < 60 * 1000) return "刚刚";
      if (diff < 60 * 60 * 1000) return `${Math.floor(diff / (60 * 1000))} 分钟前`;
      if (diff < 24 * 60 * 60 * 1000) return `${Math.floor(diff / (60 * 60 * 1000))} 小时前`;
      return `${date.getMonth() + 1}-${date.getDate()} ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;

    function sanitizeForXArticles(doc) {
      const ALLOWED_TAGS = new Set(["h2", "h3", "p", "strong", "em", "del", "a", "ul", "ol", "li", "blockquote", "br", "b", "i", "s"]);
      doc.querySelectorAll("h1").forEach((node) => {
        const h2 = doc.createElement("h2");
        h2.innerHTML = node.innerHTML;
        node.parentNode.replaceChild(h2, node);
      });
      doc.querySelectorAll("h4, h5, h6").forEach((node) => {
        const h3 = doc.createElement("h3");
        h3.innerHTML = node.innerHTML;
        node.parentNode.replaceChild(h3, node);
      });
      doc.querySelectorAll('div[style*="border-radius"], pre').forEach((block) => {
        const codeEl = block.querySelector("code") || block;
        const codeText = codeEl.textContent || codeEl.innerText || "";
        const bq = doc.createElement("blockquote");
        codeText.split("\n").forEach((line, i) => {
          if (i > 0) bq.appendChild(doc.createElement("br"));
          bq.appendChild(doc.createTextNode(line || "\u00A0"));
        });
        block.parentNode.replaceChild(bq, block);
      });
      doc.querySelectorAll("table").forEach((table) => {
        const bq = doc.createElement("blockquote");
        table.querySelectorAll("tr").forEach((row, ri) => {
          if (ri > 0) bq.appendChild(doc.createElement("br"));
          const cellTexts = Array.from(row.querySelectorAll("th, td")).map((c) => (c.textContent || "").trim());
          bq.appendChild(doc.createTextNode(`| ${cellTexts.join(" | ")} |`));
        });
        table.parentNode.replaceChild(bq, table);
      });
      doc.querySelectorAll("img").forEach((img) => {
        const p = doc.createElement("p");
        p.textContent = `[${img.getAttribute("alt") || "图片"}]`;
        const parent = img.parentNode;
        if (parent && parent.tagName === "P") parent.parentNode.replaceChild(p, parent);
        else img.parentNode.replaceChild(p, img);
      });
      doc.querySelectorAll("hr").forEach((hr) => {
        const p = doc.createElement("p");
        p.textContent = "———";
        hr.parentNode.replaceChild(p, hr);
      });
      const cleanNode = (node) => {
        if (node.nodeType !== Node.ELEMENT_NODE) return;
        Array.from(node.childNodes).forEach(cleanNode);
        const tag = node.tagName.toLowerCase();
        if (tag !== "a") {
          while (node.attributes.length) node.removeAttribute(node.attributes[0].name);
        } else {
          const href = node.getAttribute("href");
          while (node.attributes.length) node.removeAttribute(node.attributes[0].name);
          if (href) node.setAttribute("href", href);
        }
        if (!ALLOWED_TAGS.has(tag) && tag !== "body") {
          const fragment = doc.createDocumentFragment();
          while (node.firstChild) fragment.appendChild(node.firstChild);
          node.parentNode.replaceChild(fragment, node);
        }
      };
      cleanNode(doc.body);
      doc.querySelectorAll("blockquote, p").forEach((el) => {
        if (!el.textContent.trim() && !el.querySelector("br")) el.remove();
      });
    }

    async function copyHtmlToXArticles(html) {
      const parser = new DOMParser();

      sanitizeForXArticles(doc);
      const finalHtml = doc.body.innerHTML;
      const plainText = doc.body.innerText || doc.body.textContent || "";
      if (navigator.clipboard && window.ClipboardItem) {
        await navigator.clipboard.write([

            "text/plain": new Blob([plainText], { type: "text/plain" }),

        return;
      }
      const temp = document.createElement("div");
      temp.innerHTML = finalHtml;
      temp.style.position = "fixed";
      temp.style.left = "-9999px";
      document.body.appendChild(temp);
      const range = document.createRange();

      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      document.execCommand("copy");
      sel.removeAllRanges();
      temp.remove();
    }

    const minLeft = 260;
    const minMiddle = 280;
    const minRight = 168;
    const splitterWidth = 6;
    const gridGap = 6;

    function getAvailableWidth() {
      const style = getComputedStyle(layout);
      const paddingLeft = parseFloat(style.paddingLeft) || 0;
      const paddingRight = parseFloat(style.paddingRight) || 0;
      const total =
        layout.clientWidth -
        paddingLeft -
        paddingRight -
        splitterWidth * 2 -
        gridGap * 4;
      return Math.max(0, total);
    }

    function clampWidths(leftPx, middlePx, rightPx) {
      const total = getAvailableWidth();
      if (total <= 0) return { left: leftPx, middle: middlePx, right: rightPx };
      const minSum = minLeft + minMiddle + minRight;
      if (total <= minSum) {
        const scale = total / minSum;
        return {
          left: Math.max(160, Math.floor(minLeft * scale)),
          middle: Math.max(180, Math.floor(minMiddle * scale)),
          right: Math.max(140, Math.floor(minRight * scale)),
        };
      }
      const maxExtra = total - minSum;
      const baseLeft = Math.max(minLeft, leftPx);
      const baseMiddle = Math.max(minMiddle, middlePx);
      const baseRight = Math.max(minRight, rightPx);
      const baseExtra = baseLeft + baseMiddle + baseRight - minSum;
      const ratioLeft = baseExtra > 0 ? (baseLeft - minLeft) / baseExtra : 1 / 3;
      const ratioMiddle = baseExtra > 0 ? (baseMiddle - minMiddle) / baseExtra : 1 / 3;
      const ratioRight = 1 - ratioLeft - ratioMiddle;
      return {
        left: Math.round(minLeft + maxExtra * ratioLeft),
        middle: Math.round(minMiddle + maxExtra * ratioMiddle),
        right: Math.round(minRight + maxExtra * ratioRight),
      };
    }

    function setLayoutWidths(leftPx, middlePx, rightPx) {
      const clamped = clampWidths(leftPx, middlePx, rightPx);
      layout.style.gridTemplateColumns = `${clamped.left}px ${splitterWidth}px ${clamped.middle}px ${splitterWidth}px ${clamped.right}px`;
      localStorage.setItem("md-layout-widths", JSON.stringify(clamped));
    }

    function initLayoutWidths() {
      const saved = localStorage.getItem("md-layout-widths");
      if (saved) {
        try {
          const { left, middle, right } = JSON.parse(saved);
          if (left && middle && right) return setLayoutWidths(left, middle, Math.max(minRight, Math.min(right, 208)));
        } catch {}
      }
      const total = getAvailableWidth();
      if (total <= 0) return;
      setLayoutWidths(total * 0.39, total * 0.43, minRight);
    }

    function setupSplitter(splitter, side) {
      splitter.addEventListener("mousedown", (e) => {
        if (window.matchMedia("(max-width: 1100px)").matches) return;
        e.preventDefault();
        splitter.classList.add("active");
        const startX = e.clientX;
        const rect = layout.getBoundingClientRect();
        const totalWidth = rect.width - splitterWidth * 2;
        const cols = getComputedStyle(layout).gridTemplateColumns.split(" ").map((c) => parseFloat(c));
        let leftW = cols[0];
        let middleW = cols[2];
        let rightW = cols[4];

        function onMove(ev) {
          const dx = ev.clientX - startX;
          if (side === "left") {
            let nextLeft = Math.max(minLeft, Math.min(leftW + dx, totalWidth - minMiddle - minRight));
            let nextMiddle = Math.max(minMiddle, totalWidth - nextLeft - rightW);
            if (nextMiddle < minMiddle) {
              nextMiddle = minMiddle;
              nextLeft = totalWidth - nextMiddle - rightW;
            }
            setLayoutWidths(nextLeft, nextMiddle, rightW);
          } else {
            let nextRight = Math.max(minRight, Math.min(rightW - dx, totalWidth - minLeft - minMiddle));
            let nextMiddle = Math.max(minMiddle, totalWidth - leftW - nextRight);
            if (nextMiddle < minMiddle) {
              nextMiddle = minMiddle;
              nextRight = totalWidth - leftW - nextMiddle;
            }
            setLayoutWidths(leftW, nextMiddle, nextRight);
          }
        }

        function onUp() {
          splitter.classList.remove("active");
          window.removeEventListener("mousemove", onMove);
          window.removeEventListener("mouseup", onUp);
        }

        window.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup", onUp);
      });
    }

    setupSplitter(splitterLeft, "left");
    setupSplitter(splitterRight, "right");
    initLayoutWidths();
    window.addEventListener("resize", () => {
      const saved = localStorage.getItem("md-layout-widths");
      if (!saved) return initLayoutWidths();
      try {
        const { left, middle, right } = JSON.parse(saved);
        if (left && middle && right) setLayoutWidths(left, middle, right);
      } catch {
        initLayoutWidths();
      }
    });
  </script>
</body>
</html>
